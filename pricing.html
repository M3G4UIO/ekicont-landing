<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Precios — Ekicont</title>
    <meta name="description"
        content="Planes de Ekicont para Independientes y Equipos. Contabilidad, SRI, facturación electrónica y más. Desde $0/mes." />
    <link rel="icon" href="img/favicon.ico" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/pricing.css" />
    <link rel="stylesheet" href="css/login-modal.css" />
</head>

<body>

    <!-- Background glows -->
    <div class="bg-glows" aria-hidden="true">
        <div class="glow glow-pink"></div>
        <div class="glow glow-blue"></div>
        <div class="glow glow-green"></div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar" id="navbar">
        <div class="navbar-inner">
            <a href="/" class="logo-text">Ekicont<span class="logo-dot">.</span></a>
            <ul class="nav-links">
                <li><a href="/#apps">Aplicaciones</a></li>
                <li><a href="/pricing" style="color:var(--pink)">Precios</a></li>
                <li><a href="/#valor">Nosotros</a></li>
            </ul>
            <div class="nav-actions">
                <button class="btn-theme" id="btnTheme" aria-label="Cambiar tema">☀️</button>
                <button class="btn-primary" id="loginBtn">Iniciar sesión</button>
            </div>
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="page-content">
        <div class="pricing-page-wrapper">

            <!-- HEADER -->
            <header class="pricing-header animate-in" id="pricingHeader">
                <div class="pricing-eyebrow" style="display: inline-flex; align-items: center;">
                    <span class="eyebrow-dot">●</span>
                    <img src="img/logo.png" alt="Ekicont Logo"
                        style="height: 14px; margin-left: 6px; filter: var(--logo-filter);" class="site-logo" />
                </div>
                <h1 class="pricing-title">Cuentas claras,<br />sin estrés.</h1>
                <p class="pricing-sub">Contabilidad diseñada para el mundo sin fronteras.</p>
            </header>

            <!-- CONTROLS -->
            <div class="pricing-controls animate-in">

                <!-- Profile Toggle -->
                <div class="profile-toggle" id="profileToggle">
                    <button class="profile-btn active" data-profile="natural">Independiente</button>
                    <button class="profile-btn" data-profile="empresa">Equipos Remotos</button>
                </div>

                <!-- Cycle Toggle -->
                <div class="cycle-toggle" id="cycleToggle">
                    <button class="cycle-btn active" data-cycle="mensual">Mensual</button>
                    <button class="cycle-btn" data-cycle="semestral">Semestral</button>
                    <button class="cycle-btn" data-cycle="anual">
                        Anual
                        <span class="cycle-badge">SÚPER AHORRO</span>
                    </button>
                </div>
            </div>

            <!-- PRICING CARDS GRID -->
            <div class="pricing-grid" id="pricingGrid">
                <!-- Injected by pricing.js -->
            </div>

            <!-- FOOTER -->
            <footer style="margin-top: 80px;">
                <div class="footer">
                    <p class="footer-copy">© 2025 Ekiworld Tech.</p>
                    <div class="footer-links">
                        <a href="#" style="color:var(--pink)">Código Abierto</a>
                        <a href="#" style="color:var(--blue)">Términos</a>
                        <a href="#" style="color:var(--green)">Privacidad</a>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/pricing.js"></script>
</body>

</html>
